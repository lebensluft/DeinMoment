<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <style>
      .lebensluft-title {
        font-family: Georgia, serif;
        font-size: 120px;
        font-weight: bold;
        fill: #173d33;
        letter-spacing: 8px;
      }
      .lebensluft-subtitle {
        font-family: Georgia, serif;
        font-size: 48px;
        fill: #173d33;
        letter-spacing: 12px;
      }
      .heart-flourish {
        fill: none;
        stroke: #173d33;
        stroke-width: 8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="#ffffff"/>
  
  <!-- Main Text -->
  <text x="160" y="380" class="lebensluft-title">LEBENSLUFT</text>
  <text x="160" y="450" class="lebensluft-subtitle">Breathwork</text>
  
  <!-- Heart and Flourish -->
  <g transform="translate(950, 320)">
    <!-- Heart shape -->
    <path class="heart-flourish" d="M 0 40 C -30 10, -60 0, -60 -25 C -60 -50, -40 -70, -20 -70 C 0 -70, 20 -50, 0 -30 C -20 -50, 0 -70, 20 -70 C 40 -70, 60 -50, 60 -25 C 60 0, 30 10, 0 40"/>
    
    <!-- Flourish lines -->
    <path class="heart-flourish" d="M -30 45 Q -50 60, -70 50"/>
    <path class="heart-flourish" d="M 30 45 Q 50 60, 70 50"/>
  </g>
</svg>